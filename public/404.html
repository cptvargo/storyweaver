<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>StoryWeaver</title>
  <script>
    // GitHub Pages SPA redirect: encode the path into the query string
    // so the main index.html can restore it via React Router.
    var seg = 1; // number of path segments in the base URL (/storyweaver = 1)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
